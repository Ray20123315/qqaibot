name: Apply worker v1.2.22

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-worker-v1.2.22.yml

permissions:
  contents: write

jobs:
  apply-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and validate worker patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/worker-patch-v122/part-* \
            | base64 --decode \
            | gzip --decompress \
            > /tmp/worker-v1.2.22.patch

          git apply --check /tmp/worker-v1.2.22.patch
          git apply /tmp/worker-v1.2.22.patch
          node --check worker.js
          test "$(grep -m1 'const VERSION' worker.js)" = 'const VERSION = "1.2.22";'

          rm -rf .github/worker-patch-v122
          rm -f .github/workflows/apply-worker-v1.2.22.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Update worker.js to v1.2.22'
          git push origin HEAD:main
