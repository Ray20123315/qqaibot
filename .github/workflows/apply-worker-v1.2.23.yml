name: Apply worker v1.2.23

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-worker-v1.2.23.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply and validate
        shell: bash
        run: |
          set -euo pipefail
          cat .qqai-patches/worker_v1.2.23.part-* > /tmp/worker_v1.2.23.patch
          git apply --check /tmp/worker_v1.2.23.patch
          git apply /tmp/worker_v1.2.23.patch
          node --check worker.js
          grep -F 'const VERSION = "1.2.23";' worker.js
          grep -F 'inputDebounceMs: 3000' worker.js
          grep -F 'question_cancelled_by_recall' worker.js
          grep -F 'quotedRuleMessage' worker.js
          grep -F 'explicitRecallPolicy' worker.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r .qqai-patches
          git rm .github/workflows/apply-worker-v1.2.23.yml
          git add worker.js
          git commit -m "Update worker.js to v1.2.23"
          git push origin HEAD:main
