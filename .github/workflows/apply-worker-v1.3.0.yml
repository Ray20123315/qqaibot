name: Apply worker v1.3.0

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: apply-worker-v1.3.0-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'apply-worker-v1.3.0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Rebuild patch
        shell: bash
        run: |
          set -euo pipefail
          cat .qqai-patches/v1.3.0/part00 \
              .qqai-patches/v1.3.0/part01 \
              .qqai-patches/v1.3.0/part02 \
              .qqai-patches/v1.3.0/part03a \
              .qqai-patches/v1.3.0/part03b \
              .qqai-patches/v1.3.0/part03c \
              .qqai-patches/v1.3.0/part04 > /tmp/worker-v1.3.0.patch.gz.b64
          echo '0370464a05dc9b18e333aa4f4e73086885ef303e39b2fdf305a732a7fc509cfc  /tmp/worker-v1.3.0.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/worker-v1.3.0.patch.gz.b64 | gzip -d > /tmp/worker-v1.3.0.patch
          echo 'd8505006d07df25c061a1403d26da9737540cbd84505067c09e1c52532d875c1  /tmp/worker-v1.3.0.patch' | sha256sum -c -

      - name: Apply and validate worker
        shell: bash
        run: |
          set -euo pipefail
          if grep -Fq 'const VERSION = "1.2.26";' worker.js; then
            patch --dry-run -p1 < /tmp/worker-v1.3.0.patch
            patch -p1 < /tmp/worker-v1.3.0.patch
          fi
          node --check worker.js
          grep -F 'const VERSION = "1.3.0";' worker.js
          grep -F 'const OPS_CAPABILITIES' worker.js
          grep -F 'activity.cross_group' worker.js
          grep -F 'activity.invite' worker.js
          grep -F 'handleOpsPortalApi' worker.js
          grep -F 'opsInviteActivityParticipant' worker.js
          grep -F 'operationsQuietStart' worker.js
          grep -F 'automation.fuse.manage' worker.js
          grep -F 'permissions.manage' worker.js
          echo 'f1cc95ced124374c75547ebaca556a419b1fac1170ce6dde622ca7ca6e8690d5  worker.js' | sha256sum -c -

      - name: Commit worker and remove staging files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .qqai-patches/v1.3.0
          rm -f .github/workflows/apply-worker-v1.3.0.yml
          rm -f .qqai-run-v1.3.0
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A worker.js .qqai-patches .github/workflows .qqai-run-v1.3.0
          if ! git diff --cached --quiet; then
            git commit -m 'Update worker.js to v1.3.0 operations suite'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
