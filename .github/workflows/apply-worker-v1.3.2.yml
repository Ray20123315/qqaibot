name: Apply worker v1.3.2 portal reorganization

on:
  push:
    branches: [main]
    paths:
      - '.qqai-run-v1.3.2'

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.3.2
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild patch
        shell: bash
        run: |
          set -euo pipefail
          cat .qqai-patches/v1.3.2/part00 \
              .qqai-patches/v1.3.2/part01 \
              .qqai-patches/v1.3.2/part02 \
              .qqai-patches/v1.3.2/part03 \
              .qqai-patches/v1.3.2/part04 > /tmp/worker-v1.3.2.patch.gz.b64
          echo '6e204c6eb8e4eea0067d3c876b3cc08b8734c7c3d29661eb9d5d4e12d32a1c98  /tmp/worker-v1.3.2.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/worker-v1.3.2.patch.gz.b64 | gzip -d > /tmp/worker-v1.3.2.patch
          echo '894e5963a97118eb8d2d22bdeb372d1f5d2c62d16a4bb151a03ef1e428b466ce  /tmp/worker-v1.3.2.patch' | sha256sum -c -

      - name: Apply and validate worker
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.3.1";' worker.js
          patch --dry-run -p1 < /tmp/worker-v1.3.2.patch
          patch -p1 < /tmp/worker-v1.3.2.patch
          node --check worker.js
          python - <<'PY'
          from pathlib import Path
          import re
          s = Path('worker.js').read_text(encoding='utf-8')
          start = s.index('function getPortalHomePage(host)')
          start = s.index('String.raw`', start) + len('String.raw`')
          end = s.index('`);\n}', start)
          html = s[start:end]
          scripts = re.findall(r'<script(?: [^>]*)?>(.*?)</script>', html, re.S)
          assert len(scripts) >= 2
          for i, script in enumerate(scripts):
              Path(f'/tmp/portal-v132-{i}.js').write_text(script, encoding='utf-8')
          PY
          for f in /tmp/portal-v132-*.js; do node --check "$f"; done
          grep -F 'const VERSION = "1.3.2";' worker.js
          grep -F "collaboration:'活动与协作'" worker.js
          grep -F "opsRegisterWorkspace('opsSchedule','v-schedules'" worker.js
          grep -F "opsRegisterWorkspace('opsKnowledge','v-memory'" worker.js
          grep -F "opsRegisterWorkspace('opsRules','v-ruleviolations'" worker.js
          ! grep -Fq 'v-operations' worker.js
          ! grep -Fq '营运与活动中心' worker.js
          echo '957f8e40f36e6a968b26a191049a37a4256f570408ce4877f0ee5c1657b254dc  worker.js' | sha256sum -c -

      - name: Commit worker and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .qqai-patches/v1.3.2
          rm -f .qqai-run-v1.3.2
          rm -f .github/workflows/apply-worker-v1.3.2.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A worker.js .qqai-patches .qqai-run-v1.3.2 .github/workflows
          git commit -m 'Update worker.js to v1.3.2 reorganized Portal'
          git push origin HEAD:main
