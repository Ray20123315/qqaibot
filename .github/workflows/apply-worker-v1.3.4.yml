name: Apply worker v1.3.4 search activities natural commands

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.3.4-pr
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'v1.3.4-apply'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v1.3.4-apply
          fetch-depth: 0

      - name: Rebuild final patch
        shell: bash
        run: |
          set -euo pipefail
          cat .qqai-patches/v1.3.4-final/worker.patch.gz.b64.part* > /tmp/worker-v1.3.4.patch.gz.b64
          echo 'aeef9414dde5dddda343539162989f5ab83efffce1dc23eb09a25ac54d45f974  /tmp/worker-v1.3.4.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/worker-v1.3.4.patch.gz.b64 | gzip -d > /tmp/worker-v1.3.4.patch
          echo '28333e898fa465fbe2a75b5241d8277eacd1b3140b4462e14ab67c146be8f5dc  /tmp/worker-v1.3.4.patch' | sha256sum -c -

      - name: Apply and validate worker
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.3.2";' worker.js
          patch --dry-run -p1 < /tmp/worker-v1.3.4.patch
          patch -p1 < /tmp/worker-v1.3.4.patch
          node --check worker.js
          python - <<'PY'
          from pathlib import Path
          import re
          s = Path('worker.js').read_text(encoding='utf-8')
          start = s.index('function getPortalHomePage(host)')
          start = s.index('String.raw`', start) + len('String.raw`')
          end = s.index('`);\n}', start)
          html = s[start:end]
          scripts = re.findall(r'<script(?: [^>]*)?>(.*?)</script>', html, re.S)
          assert len(scripts) >= 2
          for i, script in enumerate(scripts):
              Path(f'/tmp/portal-script-{i}.js').write_text(script, encoding='utf-8')
          required = ['const VERSION = "1.3.4";', 'QQAI_V1_R34_MARKER', 'enforceExecutedSearchForReply', '检索执行纪律', 'activity.announce', 'activity.mention_all', 'classifyNaturalLanguageCommandIntent', 'normalizeNaturalLanguageCommandText', '/ops/activity/announce', 'announceOnCreate', 'announceMode']
          missing = [item for item in required if item not in s]
          assert not missing, missing
          PY
          for f in /tmp/portal-script-*.js; do node --check "$f"; done
          echo '04a71c196877c0344020f0a18ca854a3ee4112e8f3f25f4dd5f676d60a8e236b  worker.js' | sha256sum -c -

      - name: Commit worker on update branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .qqai-patches/v1.3.3 .qqai-patches/v1.3.4 .qqai-patches/v1.3.4-final
          rm -f .qqai-run-v1.3.3 .qqai-run-v1.3.4
          rm -f .github/workflows/apply-worker-v1.3.3.yml
          rm -f .github/workflows/apply-worker-v1.3.4.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A worker.js .qqai-patches .qqai-run-v1.3.3 .qqai-run-v1.3.4 .github/workflows
          git commit -m 'Update worker.js to v1.3.4 search activities natural commands'
          git push origin HEAD:v1.3.4-apply
