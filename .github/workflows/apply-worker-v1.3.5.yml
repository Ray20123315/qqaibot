name: Apply worker v1.3.5 explicit mention recovery hotfix

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.qqai-run-v1.3.5'

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.3.5
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preserve previous worker and apply wrapper
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.3.4";' worker.js
          grep -F 'QQAI_V1_R34_MARKER' worker.js
          cp worker.js worker_v1.3.4_previous.js
          cp .qqai-hotfix/worker-wrapper-v1.3.5.js worker.js
          node --check worker.js
          node --check worker_v1.3.4_previous.js
          grep -F 'HOTFIX_VERSION = "1.3.5"' worker.js
          grep -F 'class OneBotHub extends PreviousOneBotHub' worker.js
          grep -F 'worker_empty_reply' worker.js

      - name: Build delivery archive
        shell: bash
        run: |
          set -euo pipefail
          tar -czf qqaibot_worker_v1.3.5_bundle.tar.gz worker.js worker_v1.3.4_previous.js
          sha256sum worker.js worker_v1.3.4_previous.js qqaibot_worker_v1.3.5_bundle.tar.gz > qqaibot_worker_v1.3.5_SHA256SUMS.txt

      - name: Upload delivery archive
        uses: actions/upload-artifact@v4
        with:
          name: qqaibot-worker-v1.3.5
          path: |
            qqaibot_worker_v1.3.5_bundle.tar.gz
            qqaibot_worker_v1.3.5_SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Commit worker replacement
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-run-v1.3.5
          rm -rf .qqai-hotfix
          rm -f .github/workflows/apply-worker-v1.3.5.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A worker.js worker_v1.3.4_previous.js .qqai-run-v1.3.5 .qqai-hotfix .github/workflows/apply-worker-v1.3.5.yml
          git commit -m 'Fix explicit @ reply recovery and diagnostics in worker v1.3.5'
          git push origin HEAD:main
