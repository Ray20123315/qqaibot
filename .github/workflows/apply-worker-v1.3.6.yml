name: Apply standalone worker v1.3.6

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.qqai-run-v1.3.6'

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.3.6
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild standalone worker
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'import previousWorker' worker.js
          grep -F 'const VERSION = "1.3.4";' worker_v1.3.4_previous.js
          cp worker_v1.3.4_previous.js worker.js
          base64 -d .qqai-patches/v1.3.6/worker.patch.b64 > /tmp/worker-v1.3.6.patch
          patch --dry-run -p1 < /tmp/worker-v1.3.6.patch
          patch -p1 < /tmp/worker-v1.3.6.patch
          node --check worker.js
          if grep -Eq '^[[:space:]]*import[[:space:]]' worker.js; then
            echo 'worker.js still contains an import statement' >&2
            exit 1
          fi
          if grep -F 'worker_v1.3.4_previous.js' worker.js; then
            echo 'worker.js still references the previous file' >&2
            exit 1
          fi
          grep -F 'const VERSION = "1.3.6";' worker.js
          grep -F 'QQAI_V1_R36_MARKER' worker.js
          grep -F 'sendImmediateThinkingIndicator' worker.js
          grep -F 'notifyExplicitReplyFailureOnce' worker.js
          python - <<'PY'
          from pathlib import Path
          import re
          s = Path('worker.js').read_text(encoding='utf-8')
          start = s.index('function getPortalHomePage(host)')
          start = s.index('String.raw`', start) + len('String.raw`')
          end = s.index('`);\n}', start)
          html = s[start:end]
          scripts = re.findall(r'<script(?: [^>]*)?>(.*?)</script>', html, re.S)
          assert len(scripts) >= 2
          for i, script in enumerate(scripts):
              Path(f'/tmp/portal-v136-{i}.js').write_text(script, encoding='utf-8')
          PY
          for f in /tmp/portal-v136-*.js; do node --check "$f"; done

      - name: Commit standalone worker
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-run-v1.3.6
          rm -rf .qqai-patches/v1.3.6
          rm -f .github/workflows/apply-worker-v1.3.6.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A worker.js .qqai-run-v1.3.6 .qqai-patches/v1.3.6 .github/workflows/apply-worker-v1.3.6.yml
          git commit -m 'Replace worker.js with standalone v1.3.6'
          git push origin HEAD:main
