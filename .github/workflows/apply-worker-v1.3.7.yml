name: Apply worker v1.3.7

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.qqai-run-v1.3.7'
  pull_request:
    branches: [main]
    paths:
      - '.qqai-run-v1.3.7'

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.3.7
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply standalone portal update
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.3.6";' worker.js
          grep -F 'QQAI_V1_R36_MARKER' worker.js
          cat \
            .qqai-patches/v1.3.7b/chunk-00 \
            .qqai-patches/v1.3.7b/chunk-01a \
            .qqai-patches/v1.3.7b/chunk-01b \
            .qqai-patches/v1.3.7b/chunk-01c \
            .qqai-patches/v1.3.7b/chunk-01d \
            .qqai-patches/v1.3.7b/chunk-02 \
            .qqai-patches/v1.3.7b/chunk-03 \
            .qqai-patches/v1.3.7b/chunk-04 \
            .qqai-patches/v1.3.7b/chunk-05 \
            .qqai-patches/v1.3.7b/chunk-06 \
            .qqai-patches/v1.3.7b/chunk-07 \
            .qqai-patches/v1.3.7b/chunk-08 \
            .qqai-patches/v1.3.7b/chunk-09 \
            > /tmp/worker-v1.3.7.patch.gz.b64
          echo '3749a8e1c11677f660eae97d8db1a9d862fff091518164781219fd0b7e4b9d16  /tmp/worker-v1.3.7.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/worker-v1.3.7.patch.gz.b64 | gzip -d > /tmp/worker-v1.3.7.patch
          echo '939fa8ed764c64f00374351437ce35e44119322293af3c7e206065b32472fcd1  /tmp/worker-v1.3.7.patch' | sha256sum -c -
          patch --dry-run -p1 < /tmp/worker-v1.3.7.patch
          patch -p1 < /tmp/worker-v1.3.7.patch
          node --check worker.js
          if grep -Eq '^[[:space:]]*import[[:space:]]' worker.js; then
            echo 'worker.js contains an import statement' >&2
            exit 1
          fi
          if grep -F 'worker_v1.3.4_previous.js' worker.js; then
            echo 'worker.js references another JavaScript file' >&2
            exit 1
          fi
          grep -F 'const VERSION = "1.3.7";' worker.js
          grep -F 'QQAI_V1_R37_PORTAL_SIMPLIFIED_MARKER' worker.js
          grep -F 'overview-hero' worker.js
          grep -F 'portalAdvancedEnabled' worker.js
          grep -F 'opsUpdateWorkspaceFields' worker.js
          if grep -F '路由摘要' worker.js; then
            echo 'obsolete route summary remains' >&2
            exit 1
          fi
          if grep -F '进阶参数 JSON' worker.js; then
            echo 'obsolete advanced JSON field remains' >&2
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re

          source = Path('worker.js').read_text(encoding='utf-8')
          start = source.index('function getPortalHomePage(host)')
          start = source.index('String.raw`', start) + len('String.raw`')
          end = source.index('`);\n}', start)
          html = source[start:end]
          scripts = re.findall(r'<script(?: [^>]*)?>(.*?)</script>', html, re.S)
          assert len(scripts) >= 2
          for index, script in enumerate(scripts):
              Path(f'/tmp/portal-v137-{index}.js').write_text(script, encoding='utf-8')

          class IdParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key == 'id':
                          self.ids.append(value)

          parser = IdParser()
          parser.feed(html)
          assert len(parser.ids) == len(set(parser.ids)), 'duplicate HTML ids'
          PY
          for script in /tmp/portal-v137-*.js; do node --check "$script"; done

      - name: Commit simplified portal
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-run-v1.3.7 .qqai-pr-trigger-v1.3.7
          rm -rf .qqai-patches/v1.3.7 .qqai-patches/v1.3.7b
          rm -f .github/workflows/apply-worker-v1.3.7.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Simplify logged-in portal UI in worker v1.3.7'
          git push origin HEAD:main
