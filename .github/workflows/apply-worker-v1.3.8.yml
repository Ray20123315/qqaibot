name: Apply worker v1.3.8

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.qqai-pr-trigger-v1.3.8'

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.3.8
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and validate standalone worker
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.3.7";' worker.js
          grep -F 'QQAI_V1_R37_PORTAL_SIMPLIFIED_MARKER' worker.js
          cat \
            .qqai-patches/v1.3.8b/chunk-00 \
            .qqai-patches/v1.3.8b/chunk-01 \
            .qqai-patches/v1.3.8b/chunk-02 \
            .qqai-patches/v1.3.8b/chunk-03 \
            > /tmp/worker-v1.3.8.patch.gz.b64
          echo 'e83c912b371b5e8ae2a35662cdda416644091f9059a33b804acbe843d6b77dbe  /tmp/worker-v1.3.8.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/worker-v1.3.8.patch.gz.b64 | gzip -d > /tmp/worker-v1.3.8.patch
          echo '5f039a5243113b401accfa16c90901ee639fe6e129aaffb99fb97af38c97c5f6  /tmp/worker-v1.3.8.patch' | sha256sum -c -
          patch --dry-run -p1 < /tmp/worker-v1.3.8.patch
          patch -p1 < /tmp/worker-v1.3.8.patch
          echo 'efad511bcf761cbeb7e6b9e38ac747c2fa90b092a0c3a19333a3d3a6568d6531  worker.js' | sha256sum -c -
          node --check worker.js
          cp worker.js /tmp/worker-v1.3.8.mjs
          node -e "import('/tmp/worker-v1.3.8.mjs').then(m=>{if(!m.default||!m.OneBotHub)throw new Error('exports missing')})"
          if grep -Eq '^[[:space:]]*import[[:space:]]' worker.js; then
            echo 'worker.js contains an import statement' >&2
            exit 1
          fi
          if grep -F 'worker_v1.3.7_previous.js' worker.js; then
            echo 'worker.js references another JavaScript file' >&2
            exit 1
          fi
          grep -F 'const VERSION = "1.3.8";' worker.js
          grep -F 'QQAI_V1_R38_AFFINITY_MANUAL_CHECK_MARKER' worker.js
          grep -F 'user_opt_out_all_ai' worker.js
          grep -F 'manual_rule_check_requested' worker.js
          grep -F 'affinity_context_enabled' worker.js
          grep -F '开发者好感度永久固定为 100' worker.js
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re
          source = Path('worker.js').read_text(encoding='utf-8')
          start = source.index('function getPortalHomePage(host)')
          start = source.index('String.raw`', start) + len('String.raw`')
          end = source.index('`);\n}', start)
          html = source[start:end]
          scripts = re.findall(r'<script(?: [^>]*)?>(.*?)</script>', html, re.S)
          assert len(scripts) >= 2
          for index, script in enumerate(scripts):
              Path(f'/tmp/portal-v138-{index}.js').write_text(script, encoding='utf-8')
          class IdParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key == 'id':
                          self.ids.append(value)
          parser = IdParser()
          parser.feed(html)
          assert len(parser.ids) == len(set(parser.ids)), 'duplicate HTML ids'
          PY
          for script in /tmp/portal-v138-*.js; do node --check "$script"; done

      - name: Commit worker v1.3.8 to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-pr-trigger-v1.3.8
          rm -rf .qqai-patches/v1.3.8 .qqai-patches/v1.3.8b
          rm -f .github/workflows/apply-worker-v1.3.8.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Add AI opt-out, manual rule checks, and affinity v1.3.8'
          git push origin HEAD:main
