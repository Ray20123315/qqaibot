name: Apply worker v1.4.1

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.qqai-pr-trigger-v1.4.1'

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.4.1
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and validate standalone worker
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.4.0";' worker.js
          cat .qqai-patches/v1.4.1/chunk-00 > /tmp/worker-v1.4.1.patch.gz.b64
          echo 'a6a6c490dc2bf962280d206ed8d9c63ff48651a31fce94bae3d2bd542b499a58  /tmp/worker-v1.4.1.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/worker-v1.4.1.patch.gz.b64 | gzip -d > /tmp/worker-v1.4.1.patch
          echo '1f0bf42017d98e916b99c718f0dd7a1663fc3671e8c0213ada53f5fdd6130e5a  /tmp/worker-v1.4.1.patch' | sha256sum -c -
          patch --dry-run -p1 < /tmp/worker-v1.4.1.patch
          patch -p1 < /tmp/worker-v1.4.1.patch
          echo '683f160654e21de52f9da4862d258319a2338f81470147835fae915b646c783b  worker.js' | sha256sum -c -
          node --check worker.js
          cp worker.js /tmp/worker-v1.4.1.mjs
          node -e "import('/tmp/worker-v1.4.1.mjs').then(m=>{if(!m.default||!m.OneBotHub)throw new Error('exports missing')})"
          if grep -Eq '^[[:space:]]*import[[:space:]]' worker.js; then exit 1; fi
          grep -F 'const VERSION = "1.4.1";' worker.js
          grep -F 'QQAI_V1_R41_REPLY_SEMANTICS_RESTORE_MARKER' worker.js
          grep -F 'if (!isAutoInterject && (quotedMessageId || botMentioned))' worker.js
          grep -F 'message.push({ type: "reply", data: { id: String(body.message_id) } });' worker.js
          grep -F '...(body.message_id !== undefined && body.message_id !== null ? [{ type: "reply", data: { id: String(body.message_id) } }] : [])' worker.js
          grep -F 'worker_http_error' worker.js
          grep -F 'ai_disabled' worker.js
          grep -F 'selectedJoinUrl' worker.js
          grep -F '系统维护' worker.js

      - name: Commit worker v1.4.1 to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-pr-trigger-v1.4.1
          rm -rf .qqai-patches/v1.4.1
          rm -f .github/workflows/apply-worker-v1.4.1.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Restore original OneBot reply semantics v1.4.1'
          git push origin HEAD:main
