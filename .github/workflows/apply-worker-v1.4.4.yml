name: Apply worker v1.4.4

on:
  pull_request:
    branches: [main]
    paths:
      - '.qqai-pr-trigger-v1.4.4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.4.4
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and validate standalone worker
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.4.3";' worker.js
          cat .qqai-patches/v1.4.4/chunk-00 > /tmp/worker-v1.4.4.patch.gz.b64
          echo 'ddd490cb4c9363b3d930dc7ca1c2eba91da9bae313d9281269263cc75c7ede07  /tmp/worker-v1.4.4.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/worker-v1.4.4.patch.gz.b64 | gzip -d > /tmp/worker-v1.4.4.patch
          echo '13fe7e19563a62511b7ce24c4a887d0cf5177269b3236d4bb041205f2ea6de33  /tmp/worker-v1.4.4.patch' | sha256sum -c -
          git apply --check /tmp/worker-v1.4.4.patch
          git apply /tmp/worker-v1.4.4.patch
          echo '36ec8110701f4d6d272a80b1f641d57cddf65750ff0c4c0898a1cd5c447d4006  worker.js' | sha256sum -c -
          node --check worker.js
          cp worker.js /tmp/worker-v1.4.4.mjs
          node -e "import('/tmp/worker-v1.4.4.mjs').then(m=>{if(!m.default||!m.OneBotHub)throw new Error('exports missing')})"
          if grep -Eq '^[[:space:]]*import[[:space:]]' worker.js; then exit 1; fi
          grep -F 'const VERSION = "1.4.4";' worker.js
          grep -F 'QQAI_V1_R44_PERSISTENT_LOGIN_PERMISSION_LIST_MOBILE_MARKER' worker.js
          grep -F 'portalSessionTtlMs: 30 * 24 * 60 * 60 * 1000' worker.js
          grep -F 'portalSessionAbsoluteTtlMs: 180 * 24 * 60 * 60 * 1000' worker.js
          grep -F 'rememberLogin' worker.js
          grep -F '/root/program-permissions' worker.js
          grep -F 'programPermissionList' worker.js
          grep -F 'permission_explicit_index:' worker.js
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re

          source = Path('worker.js').read_text(encoding='utf-8')
          start = source.index('function getPortalHomePage(host)')
          start = source.index('String.raw`', start) + len('String.raw`')
          end = source.index('`);\n}', start)
          html = source[start:end]
          scripts = re.findall(r'<script(?: [^>]*)?>(.*?)</script>', html, re.S)
          assert len(scripts) >= 2
          for i, script in enumerate(scripts):
              Path(f'/tmp/portal-v144-{i}.js').write_text(script, encoding='utf-8')

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__(); self.ids=[]
              def handle_starttag(self, tag, attrs):
                  self.ids += [value for key, value in attrs if key == 'id']
          parser = Parser(); parser.feed(html)
          assert len(parser.ids) == len(set(parser.ids))
          assert '在这台设备保持登录' in html
          assert '当前已授予' in html
          assert 'programPermissionList' in html
          generic = html.index('.row>.btn,.row>select,.row>input{width:100%')
          final_mobile = html.rindex('/* v1.4.4：手机端不再使用 sticky 顶栏')
          assert final_mobile > generic
          mobile = html[final_mobile:]
          assert '.topbar{position:relative!important' in mobile
          assert '.topbar>.row>.mobile-menu{width:48px!important' in mobile
          assert '.top-actions{display:grid!important' in mobile
          assert 'grid-template-columns:minmax(0,1fr)!important' in mobile
          PY
          for script in /tmp/portal-v144-*.js; do node --check "$script"; done

      - name: Commit worker v1.4.4 to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-pr-trigger-v1.4.4
          rm -rf .qqai-patches/v1.4.4
          rm -f .github/workflows/apply-worker-v1.4.4.yml
          rm -f .github/workflows/export-worker-inspect.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Restore persistent login and permission list v1.4.4'
          git push origin HEAD:main
