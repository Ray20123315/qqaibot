name: Apply worker v1.4.6

on:
  pull_request:
    branches: [main]
    paths:
      - '.qqai-pr-trigger-v1.4.6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-worker-v1.4.6
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply and validate standalone worker
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.4.5";' worker.js
          cat \
            .qqai-patches/v1.4.6/chunk-00 \
            .qqai-patches/v1.4.6/chunk-01 \
            .qqai-patches/v1.4.6/chunk-02 \
            .qqai-patches/v1.4.6/chunk-03 \
            .qqai-patches/v1.4.6/chunk-04 \
            .qqai-patches/v1.4.6/chunk-05 \
            .qqai-patches/v1.4.6/chunk-06 \
            .qqai-patches/v1.4.6/chunk-07 \
            .qqai-patches/v1.4.6/chunk-08 \
            .qqai-patches/v1.4.6/chunk-09 \
            .qqai-patches/v1.4.6/chunk-10 \
            .qqai-patches/v1.4.6/chunk-11 \
            > /tmp/worker-v1.4.6.patch.gz.b64
          echo '5d379679005c19923b78910785dc11753e2b8c21b7be2d788ce95ea0da280caa  /tmp/worker-v1.4.6.patch.gz.b64' | sha256sum -c -
          base64 -d /tmp/worker-v1.4.6.patch.gz.b64 | gzip -d > /tmp/worker-v1.4.6.patch
          echo '8bb2fa4c6c39c0f9e6e2915d86b4e8e8b039e122f8a635932d19d67c0f86080f  /tmp/worker-v1.4.6.patch' | sha256sum -c -
          git apply --check /tmp/worker-v1.4.6.patch
          git apply /tmp/worker-v1.4.6.patch
          echo 'f0881282a21731d4de8347efa5377802dc3714461217df43c9a9775b94597e32  worker.js' | sha256sum -c -
          node --check worker.js
          cp worker.js /tmp/worker-v1.4.6.mjs
          node -e "import('/tmp/worker-v1.4.6.mjs').then(m=>{if(!m.default||!m.OneBotHub)throw new Error('exports missing')})"
          if grep -Eq '^[[:space:]]*import[[:space:]]' worker.js; then exit 1; fi
          grep -F 'const VERSION = "1.4.6";' worker.js
          grep -F 'QQAI_V1_R46_ERROR_SEARCH_PROPOSAL_MARKER' worker.js
          grep -F 'MODEL_CREDENTIALS_MISSING' worker.js
          grep -F 'DATABASE_ERROR' worker.js
          grep -F 'NAPCAT_CONNECTION_ERROR' worker.js
          grep -F '正在搜索...' worker.js
          grep -F '正在整理...' worker.js
          grep -F 'versionSensitiveMechanic' worker.js
          grep -F 'replyNeedsSearchRecovery' worker.js
          grep -F 'request.method === "POST" && path === "/ops/action"' worker.js
          test "$(grep -c 'request.method === "POST" && path === "/ops/action"' worker.js)" = "1"
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re
          source=Path('worker.js').read_text(encoding='utf-8')
          start=source.index('function getPortalHomePage(host)')
          start=source.index('String.raw`',start)+len('String.raw`')
          end=source.index('`);\n}',start)
          html=source[start:end]
          scripts=re.findall(r'<script(?: [^>]*)?>(.*?)</script>',html,re.S)
          assert len(scripts)>=2
          for i,script in enumerate(scripts): Path(f'/tmp/portal-v146-{i}.js').write_text(script,encoding='utf-8')
          class P(HTMLParser):
              def __init__(self): super().__init__(); self.ids=[]
              def handle_starttag(self,tag,attrs): self.ids += [v for k,v in attrs if k=='id']
          p=P(); p.feed(html)
          assert len(p.ids)==len(set(p.ids))
          assert "api('/ops/action','POST'" in html
          assert '资料来源：' in source
          PY
          for script in /tmp/portal-v146-*.js; do node --check "$script"; done
          cp worker.js /tmp/worker-v146-test.mjs
          cat >> /tmp/worker-v146-test.mjs <<'JS'
          export { searchRequirement, classifyOperationalFailure, generateHybridReply, handleOpsPortalApi, aiReplySignalsUncertainty };
          JS
          cat > /tmp/test-v146.mjs <<'JS'
          import { searchRequirement, classifyOperationalFailure, generateHybridReply, handleOpsPortalApi } from './worker-v146-test.mjs';
          const assert=(v,m)=>{if(!v)throw new Error(m)};
          const req=searchRequirement('火焰保护附魔可不可以减少火焰燃烧的时间？');
          assert(req.needed&&req.versionSensitiveMechanic,'Minecraft search requirement');
          assert(classifyOperationalFailure('GEMINI_SEARCH_API_KEYS_MISSING',{disposition:'worker_error'}).code==='MODEL_CREDENTIALS_MISSING','key classification');
          assert(classifyOperationalFailure('D1 database failed',{disposition:'worker_error'}).code==='DATABASE_ERROR','db classification');
          assert(classifyOperationalFailure('ONEBOT_HUB_NOT_BOUND',{disposition:'worker_error'}).code==='NAPCAT_CONNECTION_ERROR','OneBot classification');
          const phases=[]; const oldFetch=globalThis.fetch;
          globalThis.fetch=async (_url,init={})=>{const b=JSON.parse(init.body||'{}'),search=Array.isArray(b.tools)&&b.tools.length;return Response.json(search?{candidates:[{content:{parts:[{text:'已查证的事实摘要'}]},groundingMetadata:{webSearchQueries:['query'],groundingChunks:[{web:{uri:'https://help.minecraft.net/example',title:'Minecraft Help'}}]}}],usageMetadata:{}}:{candidates:[{content:{parts:[{text:'可以减少燃烧时间。'}]}}],usageMetadata:{}})};
          const out=await generateHybridReply({GEMINI_SEARCH_API_KEYS:'s',GEMINI_API_KEYS:'c',DEEPSEEK_ENABLED:'false'},{modelPref:'auto',chatModels:['gemini-test'],finalStylePrompt:'准确回答',contents:[{role:'user',parts:[{text:'火焰保护附魔可不可以减少火焰燃烧的时间？'}]}],cleanText:'火焰保护附魔可不可以减少火焰燃烧的时间？',fastChat:false,hasMedia:false,visionRequest:false,userId:'1',groupId:'2',isDeveloper:false,signal:null,onSearchStatus:async p=>phases.push(p)}); globalThis.fetch=oldFetch;
          assert(phases.join(',')==='searching,organizing','status phases');
          assert(out.searchPerformed&&out.text.includes('资料来源：'),'sources appended');
          class DB{constructor(){this.m=new Map()}prepare(sql){const d=this;return{bind(...a){return{async first(){return /SELECT value/.test(sql)&&d.m.has(String(a[0]))?{value:d.m.get(String(a[0]))}:null},async run(){if(/INSERT INTO/.test(sql))d.m.set(String(a[0]),String(a[1]));else if(/DELETE FROM/.test(sql))d.m.delete(String(a[0]));return{success:true}},async all(){return{results:[]}}}}}}}
          const db=new DB(),hub={fetch:async(_u,init)=>{const p=JSON.parse(init.body||'{}');let data={};if(p.action==='get_group_member_info'){const q=String(p.params.user_id);data={user_id:q,card:q==='10001'?'测试管理':'目标成员',nickname:q,role:q==='10001'?'admin':'member'}}else if(p.action==='send_group_msg')data={message_id:778899};return Response.json({ok:true,sent:true,data})}};
          const env={DB:db,ONEBOT_HUB:{idFromName:()=>1,get:()=>hub},ONEBOT_ACCESS_TOKEN:'token',DEVELOPER_ID:'99999'};
          const reqObj=new Request('https://x/api/portal/ops/action',{method:'POST',headers:{'content-type':'application/json'},body:'{}'}),body={action:'mute',qq:'3599701940',duration:'10分',reason:'用户明确要求'};
          const res=await handleOpsPortalApi(reqObj,env,new URL(reqObj.url),'/ops/action',body,{qq:'10001',groupId:'123456',role:'admin',permissions:{groupOps:true,nativeAdmin:true}}),json=await res.json();
          assert(res.status===200&&json.ok&&json.pendingConfirmation,'ops/action route');
          assert(json.proposal.durationSeconds===600&&json.proposal.targetId==='3599701940','proposal fields');
          console.log('v1.4.6 runtime checks passed');
          JS
          node /tmp/test-v146.mjs

      - name: Commit worker v1.4.6 to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-pr-trigger-v1.4.6
          rm -rf .qqai-patches/v1.4.6
          rm -f .github/workflows/apply-worker-v1.4.6.yml
          rm -f .github/workflows/export-worker-current.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Add precise errors search states and proposal route v1.4.6'
          git push origin HEAD:main
