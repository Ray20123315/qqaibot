name: Apply worker v1.5.0
on:
  pull_request:
    branches: [main]
    paths: ['.qqai-pr-trigger-v1.5.0']
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: apply-worker-v1.5.0
  cancel-in-progress: false
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - name: Reconstruct and apply exact patch
        shell: bash
        run: |
          set -euo pipefail
          grep -F 'const VERSION = "1.4.6";' worker.js
          echo 'f0881282a21731d4de8347efa5377802dc3714461217df43c9a9775b94597e32  worker.js' | sha256sum -c -
          cat .qqai-patches/v1.5.0/chunk-* >/tmp/p.b64
          echo 'fe64ac3520f1674b7aeb2f7631ccf1347b29d42d84f1ea625713c64d6ccd8168  /tmp/p.b64' | sha256sum -c -
          base64 -d /tmp/p.b64 | gzip -d >/tmp/p.patch
          echo 'c8a9eac77d13e562e2b1e82c5bd7b536a929b5de1afd3a1436aef141e6b9c41f  /tmp/p.patch' | sha256sum -c -
          git apply --check /tmp/p.patch && git apply /tmp/p.patch
          echo 'c3190291fa2c0e40cb482da43b5bcf8a1318fc0c838f0ec40f8b931b8bdbe14d  worker.js' | sha256sum -c -
      - name: Validate standalone module and Portal
        shell: bash
        run: |
          set -euo pipefail
          node --check worker.js
          cp worker.js /tmp/w.mjs
          node -e "import('/tmp/w.mjs').then(m=>{if(!m.default||!m.OneBotHub)throw Error('exports')})"
          ! grep -Eq '^[[:space:]]*import[[:space:]]' worker.js
          for x in 'const VERSION = "1.5.0";' QQAI_V1_R50_AUTH_SECURITY_FREEZE_MARKER SESSION_STORAGE_UNAVAILABLE /api/auth/login-password /security/2fa/setup 'generateBackupCodes(10)' PBKDF2 AES-GCM "credentials:'include'"; do grep -F "$x" worker.js >/dev/null; done
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re
          s=Path('worker.js').read_text(); a=s.index('function getPortalHomePage(host)'); a=s.index('String.raw`',a)+len('String.raw`'); h=s[a:s.index('`);\n}',a)]
          js=re.findall(r'<script(?: [^>]*)?>(.*?)</script>',h,re.S); assert len(js)>=2
          for i,x in enumerate(js): Path(f'/tmp/portal-v150-{i}.js').write_text(x)
          class P(HTMLParser):
            def __init__(self): super().__init__(); self.ids=[]
            def handle_starttag(self,t,a): self.ids += [v for k,v in a if k=='id']
          p=P(); p.feed(h); assert len(p.ids)==len(set(p.ids))
          for x in ['loginPasswordPane','loginPassword','loginFactorWrap','rememberLogin']: assert x in p.ids
          assert '登录与双因数验证' in h and 'accountSecurityPanel' in h and '在这台设备保持登录（最长 180 天）' in h
          PY
          for f in /tmp/portal-v150-*.js; do node --check "$f"; done
      - name: Test session password and 2FA flows
        shell: bash
        run: |
          set -euo pipefail
          cat >/tmp/t.mjs <<'JS'
          import w from '/tmp/w.mjs';import c from'node:crypto';if(!globalThis.crypto)globalThis.crypto=c.webcrypto;
          class S{constructor(d,s){this.d=d;this.s=s;this.a=[]}bind(...a){this.a=a;return this}async first(){if(this.d.r-->0)throw Error('D1 read');let k=String(this.a[0]);return this.d.m.has(k)?{value:this.d.m.get(k)}:null}async run(){if(this.d.w-->0)throw Error('D1 write');let k=String(this.a[0]);if(this.s.startsWith('INSERT'))this.d.m.set(k,String(this.a[1]));if(this.s.startsWith('DELETE'))this.d.m.delete(k);return{success:true}}async all(){return{results:[]}}}class D{constructor(){this.m=new Map;this.r=0;this.w=0}prepare(s){return new S(this,s)}}
          let D1=new D,e={DB:D1,PORTAL_AUTH_SECRET:'test-portal-auth-secret-32-characters',DEVELOPER_QQ:'3569028262'},q='3569028262',ck='';let A=(x,m)=>{if(!x)throw Error(m)},seed=x=>D1.m.set('portal_auth_code:'+q,JSON.stringify({code:x,qq:q,expiresAt:Date.now()+3e5,attempts:0}));async function f(p,m='GET',b){let h={};if(b)h['content-type']='application/json';if(ck)h.cookie=ck;let r=await w.fetch(new Request('https://x'+p,{method:m,headers:h,body:b&&JSON.stringify(b)}),e,{waitUntil(){}}),j=await r.json().catch(()=>({}));return[r,j]}
          seed('111111');D1.w=3;let [r,j]=await f('/api/auth/verify-code','POST',{qq:q,code:'111111',remember:true});A(r.status===503&&D1.m.has('portal_auth_code:'+q),'write failure');seed('222222');[r,j]=await f('/api/auth/verify-code','POST',{qq:q,code:'222222',remember:true});ck=(r.headers.get('set-cookie')||'').split(';')[0];A(r.status===200&&/Max-Age=15552000/.test(r.headers.get('set-cookie'))&&/Expires=/.test(r.headers.get('set-cookie')),'cookie');[r,j]=await f('/api/portal/me');A(r.status===200&&r.headers.get('set-cookie'),'reload');D1.r=3;[r,j]=await f('/api/portal/me');A(r.status===503&&j.retryable&&j.code==='SESSION_STORAGE_UNAVAILABLE','read failure');D1.r=0;[r,j]=await f('/api/portal/security/password','POST',{newPassword:'Correct-Horse-Battery-99'});A(j.ok,'password');[r,j]=await f('/api/portal/security/2fa/setup','POST',{currentPassword:'Correct-Horse-Battery-99'});A(j.ok&&j.secret,'setup');let B='ABCDEFGHIJKLMNOPQRSTUVWXYZ234567',dec=s=>{let n=0,z=0,o=[];for(let x of s){let i=B.indexOf(x);if(i<0)continue;n=n<<5|i;z+=5;if(z>=8){o.push(n>>>(z-8)&255);z-=8}}return Buffer.from(o)},tot=s=>{let b=Buffer.alloc(8);b.writeBigUInt64BE(BigInt(Math.floor(Date.now()/3e4)));let h=c.createHmac('sha1',dec(s)).update(b).digest(),o=h.at(-1)&15,n=(h[o]&127)<<24|h[o+1]<<16|h[o+2]<<8|h[o+3];return String(n%1e6).padStart(6,'0')};[r,j]=await f('/api/portal/security/2fa/enable','POST',{code:tot(j.secret)});A(j.ok&&j.backupCodes.length===10,'2fa');let b=j.backupCodes[0];ck='';[r,j]=await f('/api/auth/login-password','POST',{qq:q,password:'Correct-Horse-Battery-99',factorType:'backup',factorCode:b,remember:true});A(j.ok,'backup');ck='';[r,j]=await f('/api/auth/login-password','POST',{qq:q,password:'Correct-Horse-Battery-99',factorType:'backup',factorCode:b});A(r.status===401,'one time');seed('333333');[r,j]=await f('/api/auth/login-password','POST',{qq:q,password:'Correct-Horse-Battery-99',factorType:'qq_code',factorCode:'333333'});A(j.ok,'qq factor');console.log('v1.5.0 auth runtime PASS');
          JS
          node /tmp/t.mjs
      - name: Commit worker v1.5.0 to main
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-pr-trigger-v1.5.0
          rm -rf .qqai-patches/v1.5.0
          rm -f .github/workflows/apply-worker-v1.5.0.yml
          git config user.name qqai-updater
          git config user.email actions@users.noreply.github.com
          git add -A && git commit -m 'Stabilize sessions and add password 2FA v1.5.0'
          git push origin HEAD:main
