name: Commit worker v1.3.5 delivery bundle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.qqai-commit-bundle-v1.3.5'

permissions:
  contents: write

concurrency:
  group: commit-worker-v1.3.5-bundle
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate and package
        shell: bash
        run: |
          set -euo pipefail
          node --check worker.js
          node --check worker_v1.3.4_previous.js
          mkdir -p delivery
          tar -czf delivery/qqaibot_worker_v1.3.5_bundle.tar.gz worker.js worker_v1.3.4_previous.js
          sha256sum worker.js worker_v1.3.4_previous.js delivery/qqaibot_worker_v1.3.5_bundle.tar.gz > delivery/qqaibot_worker_v1.3.5_SHA256SUMS.txt

      - name: Commit bundle and remove publisher
        shell: bash
        run: |
          set -euo pipefail
          rm -f .qqai-commit-bundle-v1.3.5
          rm -f .github/workflows/commit-worker-v1.3.5-bundle.yml
          git config user.name 'qqai-updater'
          git config user.email 'actions@users.noreply.github.com'
          git add -A delivery .qqai-commit-bundle-v1.3.5 .github/workflows/commit-worker-v1.3.5-bundle.yml
          git commit -m 'Add worker v1.3.5 delivery bundle'
          git push origin HEAD:main
