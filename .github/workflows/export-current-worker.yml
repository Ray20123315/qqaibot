name: Export current worker
on:
  push:
    branches: [main]
    paths: ['.qqai-export-current-worker']
permissions:
  contents: write
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: current-worker-source
          path: worker.js
          if-no-files-found: error
          retention-days: 1
      - name: Record run ID
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' '${{ github.run_id }}' > .qqai-export-run-id
          git config user.name qqai-updater
          git config user.email actions@users.noreply.github.com
          git add .qqai-export-run-id
          git commit -m 'Record current worker export run' || true
          git push origin HEAD:main
