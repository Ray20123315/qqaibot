name: Export current worker
on:
  pull_request:
    branches: [main]
    paths: ['.qqai-export-current-worker']
permissions:
  contents: read
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: current-worker-source
          path: worker.js
          if-no-files-found: error
          retention-days: 1
