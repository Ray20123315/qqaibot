name: Export current worker source

on:
  pull_request:
    branches: [main]
    paths:
      - '.qqai-export-current-trigger'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export exact worker source
        run: |
          cp worker.js worker-current.js
          sha256sum worker-current.js > worker-current.SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: worker-current-v145-source
          path: |
            worker-current.js
            worker-current.SHA256SUMS.txt
          retention-days: 1
