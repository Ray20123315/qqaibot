name: Export worker v1.3.5 artifact

on:
  pull_request:
    paths:
      - '.qqai-export-worker-v1.3.5'

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and package
        shell: bash
        run: |
          set -euo pipefail
          node --check worker.js
          node --check worker_v1.3.4_previous.js
          tar -czf qqaibot_worker_v1.3.5_bundle.tar.gz worker.js worker_v1.3.4_previous.js
          sha256sum worker.js worker_v1.3.4_previous.js qqaibot_worker_v1.3.5_bundle.tar.gz > qqaibot_worker_v1.3.5_SHA256SUMS.txt
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qqaibot-worker-v1.3.5-export
          path: |
            qqaibot_worker_v1.3.5_bundle.tar.gz
            qqaibot_worker_v1.3.5_SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 7
