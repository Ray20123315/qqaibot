name: Normalize worker v1.2.23

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/normalize-worker-v1.2.23.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Normalize and validate
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .qqai-patches/fix-worker-v1.2.23-space.patch
          git apply .qqai-patches/fix-worker-v1.2.23-space.patch
          node --check worker.js
          test "$(git hash-object worker.js)" = "7981868897c7a85026d12b2e1783aed30267a3ba"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .qqai-patches/fix-worker-v1.2.23-space.patch
          git rm .github/workflows/normalize-worker-v1.2.23.yml
          git add worker.js
          git commit -m "Normalize worker.js v1.2.23"
          git push origin HEAD:main
