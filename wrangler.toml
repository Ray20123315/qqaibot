"$schema" = "./node_modules/wrangler/config-schema.json"

name = "qqai"
main = "worker.js"
compatibility_date = "2026-07-21"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# 自訂網域
[[routes]]
pattern = "qqai.ray2025.com"
custom_domain = true

# Cloudflare Browser Rendering
[browser]
binding = "BROWSER"

# Cloudflare Workers AI
[ai]
binding = "AI"

# Durable Object
# 目前 worker.js 只匯出並使用 OneBotHub。
[[durable_objects.bindings]]
name = "ONEBOT_HUB"
class_name = "OneBotHub"

# Durable Object migration 歷史不可刪除或改名。
# Cloudflare 已部署到 v2_budget_guard；即使目前不再綁定 BudgetGuard，
# 仍必須保留 v1、v2，否則 Wrangler 會嘗試從 v1 重新套用並失敗。
[[migrations]]
tag = "v1_onebot_hub"
new_sqlite_classes = ["OneBotHub"]

[[migrations]]
tag = "v2_budget_guard"
new_sqlite_classes = ["BudgetGuard"]

# Cloudflare 遠端目前已部署至 v2_budget_guard。
# 新部署只會執行此 v3，移除已不再由 worker.js 匯出或綁定的 BudgetGuard。
[[migrations]]
tag = "v3_remove_budget_guard"
deleted_classes = ["BudgetGuard"]

# D1
[[d1_databases]]
binding = "DB"
database_name = "qqaibot"
database_id = "569a01fe-3297-40e1-832f-09c3793056ed"

# Vectorize
[[vectorize]]
binding = "VECTORIZE"
index_name = "qqai"

# 排程、主動發話與暫存清理：每分鐘觸發
[triggers]
crons = ["* * * * *"]

# Cloudflare Rate Limiter
[[ratelimits]]
name = "MY_RATE_LIMITER"
namespace_id = "999"

  [ratelimits.simple]
  limit = 1
  period = 10

# 可安全提交到 GitHub 的公開變數
[vars]
DEVELOPER_ID = "3569028262"
ENABLE_ONEBOT_HTTP_EVENTS = "false"

DEEPSEEK_FLASH_MODEL = "deepseek-v4-flash"
DEEPSEEK_PRO_MODEL = "deepseek-v4-pro"
DEEPSEEK_DAILY_BUDGET_CNY = "0.35"

GEMINI_CHAT_MODELS = "gemini-2.5-flash,gemini-2.5-flash-lite"
GEMINI_ROUTER_MODELS = "gemini-2.5-flash-lite,gemini-2.5-flash"
GEMINI_REVIEW_MODELS = "gemini-2.5-flash-lite,gemini-2.5-flash"
GEMINI_IMAGE_MODELS = "gemini-3.1-flash-image,gemini-2.5-flash-image"
GEMINI_TTS_MODELS = "gemini-2.5-flash-preview-tts"
GEMINI_LIVE_MODEL = "models/gemini-3.1-flash-live-preview"

# 持久化 Workers Logs；需要時可改成 true
[observability]
enabled = false
