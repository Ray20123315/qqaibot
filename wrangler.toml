"$schema" = "./node_modules/wrangler/config-schema.json"

name = "qqai"
main = "worker.js"
compatibility_date = "2026-07-19"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# 自訂網域：Worker 是此網域的 origin
[[routes]]
pattern = "qqai.ray2025.com"
custom_domain = true

# Browser Rendering；worker.js 使用 env.BROWSER
[browser]
binding = "BROWSER"

# Workers AI
[ai]
binding = "AI"

# Durable Objects
[[durable_objects.bindings]]
name = "ONEBOT_HUB"
class_name = "OneBotHub"

[[durable_objects.bindings]]
name = "BUDGET_GUARD"
class_name = "BudgetGuard"

# 必須保留已部署過的舊 migration tag，再以新 tag 增加 BudgetGuard
[[migrations]]
tag = "v1_onebot_hub"
new_sqlite_classes = ["OneBotHub"]

[[migrations]]
tag = "v2_budget_guard"
new_sqlite_classes = ["BudgetGuard"]

# 既有 KV
[[kv_namespaces]]
binding = "QQ_STORE"
id = "bf716105d0f6412fa97daad4e0f544d2"

# 既有 Vectorize
[[vectorize]]
binding = "VECTORIZE"
index_name = "qqai"

# 每小時執行 D1 過期資料清理；HF 喚醒已停用
[triggers]
crons = ["0 * * * *"]

# 既有 Rate Limiter
[[ratelimits]]
name = "MY_RATE_LIMITER"
namespace_id = "999"

  [ratelimits.simple]
  limit = 1
  period = 10

# D1：使用你已建立的 qqaibot 資料庫與真實 ID
[[d1_databases]]
binding = "DB"
database_name = "qqaibot"
database_id = "569a01fe-3297-40e1-832f-09c3793056ed"

# 公開 Variables
[vars]
PUBLIC_BASE_URL = "https://qqai.ray2025.com"
BACKGROUND_BROWSER_TIMEOUT = "60"
DEVELOPER_ID = "3569028262"

DEEPSEEK_MODEL = "deepseek-v4-flash"
DEEPSEEK_TOTAL_BUDGET_CNY = "20"
DEEPSEEK_DAILY_BUDGET_CNY = "0.35"
DEEPSEEK_USER_DAILY_BUDGET_CNY = "0.02"
DEEPSEEK_OWNER_DAILY_BUDGET_CNY = "0.15"
DEEPSEEK_SUMMARY_DAILY_BUDGET_CNY = "0.08"
DEEPSEEK_MAX_INPUT_TOKENS = "12000"
DEEPSEEK_SUMMARY_MAX_INPUT_TOKENS = "50000"
DEEPSEEK_MAX_OUTPUT_TOKENS = "600"
DEEPSEEK_SUMMARY_MAX_OUTPUT_TOKENS = "300"
SUMMARY_ARCHIVE_MESSAGES = "300"

GEMINI_ROUTER_ENABLED = "true"
GEMINI_ROUTER_MODEL = "gemini-2.5-flash-lite"
GEMINI_CHAT_MODELS = "gemini-2.5-flash,gemini-2.5-flash-lite"
GEMINI_MEDIA_MODELS = "gemini-2.5-flash,gemini-2.5-flash-lite"
GEMINI_IMAGE_MODELS = "gemini-3.1-flash-image,gemini-2.5-flash-image"
GEMINI_TTS_MODELS = "gemini-2.5-flash-preview-tts"
GEMINI_LIVE_MODEL = "models/gemini-3.1-flash-live-preview"

CONTEXT_MESSAGES = "60"
SUMMARY_TRIGGER_MESSAGES = "55"
SUMMARY_KEEP_MESSAGES = "24"
AUTO_INTERJECT_PERCENT = "0"
USER_COOLDOWN_MS = "6000"
MAX_CHAT_OUTPUT_CHARS = "1600"

MAX_IMAGE_BYTES = "12582912"
MAX_AUDIO_BYTES = "16777216"
MAX_VIDEO_BYTES = "29360128"
MAX_WEB_BYTES = "2097152"

AI_OUTPUT_PREFIX = ""
ENABLE_SAME_QQ_HUMAN_MODE = "true"
SAME_QQ_HUMAN_PREFIX = "//"
SAME_QQ_ASK_PREFIX = "??"

ENFORCE_GROUP_ALLOWLIST = "false"
COST_ADMIN_IDS = ""

# 不動 Hugging Face
HF_KEEPALIVE_ENABLED = "false"
HF_SPACE_URL = ""
HF_HEALTH_PATH = "/healthz"

# 不持久化 Workers Logs；Real-time Logs / wrangler tail 仍可用於即時除錯
[observability]
enabled = false
