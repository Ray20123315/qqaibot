#:schema node_modules/wrangler/config-schema.json
name = "qqai"
main = "worker.js"
compatibility_date = "2026-06-24"
compatibility_flags = [ "nodejs_compat" ]

# 🌐 把被抹除的自訂網域加回來，防止線上訪問斷線
[[routes]]
pattern = "qqai.ray2025.com"
zone_name = "ray2025.com"
custom_domain = true

[browser]
binding = "MYBROWSER"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "ONEBOT_HUB", class_name = "OneBotHub" }
]

[[migrations]]
tag = "v1_onebot_hub"
new_sqlite_classes = [ "OneBotHub" ]

[[kv_namespaces]]
binding = "QQ_STORE"
id = "bf716105d0f6412fa97daad4e0f544d2"

[[vectorize]]
binding = "VECTORIZE"
index_name = "qqai"

[vars]
BACKGROUND_BROWSER_TIMEOUT = "60"
DEVELOPER_ID = "3569028262"

# 🔥 官方最新唯一指定：ratelimits 標準格式
[[ratelimits]]
name = "MY_RATE_LIMITER"
namespace_id = "999"

  [ratelimits.simple]
  limit = 1
  period = 10

[observability.logs]
enabled = false
invocation_logs = true

[[d1_databases]]
binding = "DB"                # 必須大寫，對齊程式碼中的 env.DB
database_name = "qqaibot"   # 您在網頁上建立的 D1 資料庫名稱
database_id = "569a01fe-3297-40e1-832f-09c3793056ed" # 從 Cloudflare D1 後台複製過來的那串長 ID
