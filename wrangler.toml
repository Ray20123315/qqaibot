#:schema node_modules/wrangler/config-schema.json
name = "qqai"
main = "worker.js"
compatibility_date = "2026-06-24"
compatibility_flags = [ "nodejs_compat" ]

[browser]
binding = "MYBROWSER"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "QQ_STORE"
id = "bf716105d0f6412fa97daad4e0f544d2"

[[vectorize]]
binding = "VECTORIZE"
index_name = "qqai"

[vars]
BACKGROUND_BROWSER_TIMEOUT = "60"
DEVELOPER_ID = "3569028262"

# 🎯 完美對齊官方後台最新標準的 TOML 防刷設定
[[rate_limiting]]
binding = "MY_RATE_LIMITER" # 變數名稱
namespace_id = 999           # 命名空間識別碼 (正整數 ID)
limit = 1                   # 限制：每個期間最大要求數
period = 10                 # 期間：10 秒

[observability.logs]
enabled = false
invocation_logs = true
