#:schema node_modules/wrangler/config-schema.json
name = "qqai"
main = "worker.js"
compatibility_date = "2026-06-24"
compatibility_flags = [ "nodejs_compat" ]

# 🌐 把被抹除的自訂網域加回來，防止線上訪問斷線
[[routes]]
pattern = "qqai.ray2025.com"
zone_name = "ray2025.com"
custom_domain = true

[browser]
binding = "MYBROWSER"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "QQ_STORE"
id = "bf716105d0f6412fa97daad4e0f544d2"

[[vectorize]]
binding = "VECTORIZE"
index_name = "qqai"

[vars]
BACKGROUND_BROWSER_TIMEOUT = "60"
DEVELOPER_ID = "3569028262"

# 🔥 官方最新唯一指定：ratelimits 標準格式
[[ratelimits]]
name = "MY_RATE_LIMITER"
namespace_id = "999"

  [ratelimits.simple]
  limit = 1
  period = 10

[observability.logs]
enabled = false
invocation_logs = true
