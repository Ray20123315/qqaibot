"$schema" = "./node_modules/wrangler/config-schema.json"

name = "qqai"
main = "worker.js"
compatibility_date = "2026-07-22"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[routes]]
pattern = "qqai.ray2025.com"
custom_domain = true

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "ONEBOT_HUB"
class_name = "OneBotHub"

# 已部署過的 Durable Object migration 歷史不可刪除、改名或重排。
[[migrations]]
tag = "v1_onebot_hub"
new_sqlite_classes = ["OneBotHub"]

[[migrations]]
tag = "v2_budget_guard"
new_sqlite_classes = ["BudgetGuard"]

[[migrations]]
tag = "v3_remove_budget_guard"
deleted_classes = ["BudgetGuard"]

[[d1_databases]]
binding = "DB"
database_name = "qqaibot"
database_id = "569a01fe-3297-40e1-832f-09c3793056ed"

[[vectorize]]
binding = "VECTORIZE"
index_name = "qqai"

# 午夜打卡、排程、B站事件、平台維護與暫存清理每分鐘檢查。
[triggers]
crons = ["* * * * *"]

# 速率限制改為 D1 執行時設定，不使用固定 Cloudflare Rate Limiter binding。
# 不使用 Browser Rendering、R2、Queues、Workflows 或 Analytics Engine。
[vars]
DEVELOPER_ID = "3569028262"
ENABLE_ONEBOT_HTTP_EVENTS = "false"
PLATFORM_FEATURE_COUNT = "300"
PLATFORM_DEPLOYMENT_MODE = "single_worker"
PAID_DEPENDENCY_POLICY = "deepseek_only"
DISABLE_PAID_CLOUDFLARE_SERVICES = "true"

MODEL_COST_POLICY = "free_first"
DEEPSEEK_EMERGENCY_FALLBACK = "false"
ALLOW_PAID_CONTEXT_SUMMARY = "false"
DEEPSEEK_FLASH_MODEL = "deepseek-v4-flash"
DEEPSEEK_PRO_MODEL = "deepseek-v4-pro"
DEEPSEEK_DAILY_BUDGET_CNY = "0.35"

GEMINI_CHAT_MODELS = "gemini-3.5-flash,gemini-3.1-flash-lite,gemini-3-flash-preview,gemini-2.5-flash,gemini-2.5-flash-lite"
GEMMA_DECISION_MODELS = "gemma-4-26b-a4b-it"
GEMMA_CHAT_MODELS = "gemma-4-31b-it"
GEMMA_LAST_RESORT_MODELS = "gemma-4-31b-it"
GEMINI_TTS_MODELS = "gemini-3.1-flash-tts-preview,gemini-2.5-flash-preview-tts"
GEMINI_LIVE_MODEL = "models/gemini-3.1-flash-live-preview"

[observability]
enabled = false
